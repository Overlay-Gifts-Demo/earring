ml<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Premium AR</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>

<div id="app">

  <div id="flash-overlay"></div>

  <div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <video id="remote-video" autoplay playsinline></video>
  </div>

  <div id="loading-status">Starting Engine...</div>


  <!-- ================= HEADER ================= -->

  <header id="controls-hero">

    <div class="brand-row">

      <div class="brand-left">
        <img src="logo.png" class="brand-logo">
      </div>

      <div class="action-row">

        <button id="snapshot-btn" onclick="takeSnapshot()">📷</button>

        <button id="voice-btn" onclick="toggleVoiceControl()">🎙️</button>

      </div>

    </div>


    <!-- ===== BOTTOM PANEL ===== -->

    <div class="controls-panel">

      <button id="tryall-btn"
              class="pill accent"
              onclick="toggleTryAll()">
        Try
      </button>


      <div id="jewelry-mode" class="pill-group">

        <!-- ONLY EARRINGS -->

        <button class="pill"
                onclick="selectJewelryType('earrings')">
          Earrings
        </button>

      </div>


      <div id="jewelry-options"
           class="carousel-cards"
           style="display:none;">
      </div>

    </div>

  </header>


  <!-- ================= AI ================= -->

  <div id="ai-concierge-container">

    <div id="ai-bubble">
      Tap to activate Nila
    </div>

    <div id="ai-avatar"
         onclick="toggleConciergeMute()">

      <div class="avatar-ring"></div>
      <div class="avatar-face">🤖</div>

    </div>

  </div>



  <!-- ================= PREVIEW ================= -->

  <div id="preview-modal">

    <span class="close-preview"
          onclick="closePreview()">
      ×
    </span>

    <div class="preview-container">

      <img id="preview-image">

    </div>

    <div class="preview-actions">

      <button class="pill accent"
              onclick="downloadSingleSnapshot()">
        Download
      </button>

    </div>

  </div>



  <!-- ================= GALLERY ================= -->

  <div id="gallery-modal">

    <div class="gallery-content">

      <span class="close-gallery"
            onclick="closeGallery()">
        ×
      </span>

      <h2>Your Collection</h2>

      <div id="gallery-grid"></div>

    </div>

  </div>



  <!-- ================= TOAST ================= -->

  <div id="toast-notification">
    Ready
  </div>


</div>


<script src="core.js"></script>

<script>
document.addEventListener(
  'contextmenu',
  e => e.preventDefault()
);
</script>


</body>
</html>
